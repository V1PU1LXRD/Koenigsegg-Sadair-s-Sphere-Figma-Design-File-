<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koenigsegg — Sadair's Sphere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-logo">
            <img src="./assets/images/koenigsegg-logo.png" alt="Koenigsegg" class="logo-img">
            <span class="logo-text">Koenigsegg</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">Megacars</a></li>
            <li><a href="#">Technology</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">

        <!-- Background Title -->
        <h1 class="hero-bg-title">SPHERE</h1>

        <!-- Left Stats -->
        <div class="hero-stats">
            <div class="stat">
                <span class="stat-value">1625</span>
                <span class="stat-unit">hp</span>
                <span class="stat-label">Power</span>
            </div>
            <div class="stat">
                <span class="stat-value">360</span>
                <span class="stat-unit">km/h</span>
                <span class="stat-label">Top Speed</span>
            </div>
        </div>

        <!-- Center Content -->
        <div class="hero-center">
            <img src="./assets/images/koenigsegg-car.png" alt="Koenigsegg Sadair's Sphere" class="hero-car">
        </div>

        <!-- Right Content -->
        <div class="hero-info">
            <h2 class="hero-title">SADAIR'S</h2>
            <p class="hero-description">
                At Koenigsegg, we often say that perfection is a moving target
                — and Sadair's Sphere embodies that belief.
            </p>
            <div class="hero-thumbnail">
                <img src="./assets/images/car-top-view.png" alt="Top View">
            </div>
            <a href="#" class="btn-explore">Explore →</a>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
